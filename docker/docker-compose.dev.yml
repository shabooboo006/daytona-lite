name: daytona-dev

services:
  db:
    image: postgres:18
    environment:
      - POSTGRES_PASSWORD=pass
      - POSTGRES_USER=user
      - POSTGRES_DB=daytona
    ports:
      - "5432:5432"
    volumes:
      - db_data_dev:/var/lib/postgresql/18/docker
    networks:
      - daytona-dev-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - daytona-dev-network
    restart: unless-stopped

  registry:
    image: registry:2.8.2
    profiles:
      - registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
      REGISTRY_HTTP_ADDR: registry:6000
    volumes:
      - registry_dev:/var/lib/registry
    networks:
      - daytona-dev-network
    ports:
      - "6000:6000"
    restart: unless-stopped

  registry-ui:
    image: joxit/docker-registry-ui:main
    profiles:
      - registry
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Daytona Dev Registry UI
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
      - NGINX_PROXY_PASS_URL=http://registry:6000
      - SHOW_CATALOG_NB_TAGS=true
      - CATALOG_MIN_BRANCHES=1
      - CATALOG_MAX_BRANCHES=1
      - TAGLIST_PAGE_SIZE=100
      - REGISTRY_SECURED=false
      - CATALOG_ELEMENTS_LIMIT=1000
    networks:
      - daytona-dev-network
    ports:
      - "5100:80"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_IDENTITY_STS_EXPIRY=24h
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    networks:
      - daytona-dev-network
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  runner:
    image: ${DAYTONA_DEV_RUNNER_IMAGE:-daytonaio/daytona-runner:latest}
    entrypoint:
      - /bin/sh
      - /opt/daytona/entrypoint.dev.sh
    environment:
      - ENVIRONMENT=development
      - API_PORT=3003
      - DAYTONA_RUNNER_TOKEN=${DEFAULT_RUNNER_API_KEY:-secret_api_token}
      - LOG_FILE_PATH=/home/daytona/runner/runner.log
      - RESOURCE_LIMITS_DISABLED=true
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_BUCKET=daytona
      - DAYTONA_API_URL=${DAYTONA_API_URL:-http://host.docker.internal:3001/api}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - RUNNER_DOCKER_MODE=${DEFAULT_RUNNER_DOCKER_MODE:-host}
      - RUNNER_AUTO_REGISTER=true
      - RUNNER_DOMAIN=runner
      - RUNNER_ADVERTISE_DOMAIN=localhost
      - RUNNER_ADVERTISE_API_URL=http://localhost:3003
      - RUNNER_ADVERTISE_PROXY_URL=http://localhost:3003
      - RUNNER_STATIC_BINARIES_DIR=/tmp/daytona-runner-binaries
      - CONTAINER_NETWORK=daytona-dev_daytona-dev-network
      - SSH_GATEWAY_ENABLE=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runner/daemon.dev.json:/etc/docker/daemon.json:ro
      - ./runner/entrypoint.dev.sh:/opt/daytona/entrypoint.dev.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/daytona-runner-binaries:/tmp/daytona-runner-binaries
    networks:
      - daytona-dev-network
    ports:
      - "3003:3003"
    privileged: true
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

volumes:
  db_data_dev: {}
  registry_dev: {}
  minio_data_dev: {}

networks:
  daytona-dev-network:
    driver: bridge
